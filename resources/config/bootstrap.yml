# 项目相关配置
abundance:
  # 名称
  name: Abundance
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2025
  banner:
    charset: UTF-8
    location: resources/banner.txt

# 日志配置
logging:
  level:
    root: DEBUG
    cxframework: WARNING
  format: '%(levelname)s %(asctime)s [%(filename)s:%(lineno)d] %(message)s'
  datefmt: '%Y-%m-%d %H:%M:%S'
  file:
    name: abundance.log
    path: logs/
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

