<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页源码获取工具（server代理版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
            padding: 24px;
        }
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 24px;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        #url-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
        }
        .btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .copy-btn {
            background-color: #2ecc71;
        }
        .tip {
            color: #2ecc71;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .status { margin: 12px 0; font-size: 14px; }
        .loading { color: #3498db; }
        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
        .code-container {
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 16px;
        }
        .code-header {
            background-color: #f8f9fa;
            padding: 10px 16px;
            border-bottom: 1px solid #e1e5e9;
        }
        pre {
            max-height: 600px;
            overflow: auto;
            padding: 16px;
            background-color: #2d3436;
            color: #ecf0f1;
            white-space: pre-wrap;
        }
        @media (max-width: 768px) {
            .input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">🌐 网页源码获取</h1>
    <div class="tip">✅ 已对接反向代理，无跨域限制！</div>

    <div class="input-group">
        <input type="url" id="url-input" placeholder="请输入网页URL（https://开头）" value="https://www.baidu.com">
        <button class="btn" id="get-btn">获取源码</button>
        <button class="btn copy-btn" id="copy-btn" disabled>复制源码</button>
    </div>

    <div id="status" class="status"></div>
    <div class="code-container" id="code-box" style="display: none;">
        <div class="code-header">网页HTML源码</div>
        <pre id="code-content"></pre>
    </div>
</div>

<script>
    const urlInput = document.getElementById('url-input');
    const getBtn = document.getElementById('get-btn');
    const copyBtn = document.getElementById('copy-btn');
    const status = document.getElementById('status');
    const codeBox = document.getElementById('code-box');
    const codeContent = document.getElementById('code-content');

    let sourceCode = '';
    // ====================== 核心：对接你的本地server代理 ======================
    const PROXY_API = window.origin + '/api/proxy';

    function showStatus(text, type = '') {
        status.textContent = text;
        status.className = `status ${type}`;
    }

    // 通过server.py反向代理获取源码
    async function getSourceCode() {
        const url = urlInput.value.trim();
        if (!url) { showStatus('请输入URL', 'error'); return; }

        sourceCode = ''; copyBtn.disabled = true; codeBox.style.display = 'none';
        getBtn.disabled = true; showStatus('正在获取源码...', 'loading');

        try {
            // 请求本地server.py的代理接口
            const res = await fetch(`${PROXY_API}?url=${encodeURIComponent(url)}`);
            sourceCode = await res.text();

            codeContent.textContent = sourceCode;
            codeBox.style.display = 'block';
            copyBtn.disabled = false;
            showStatus('✅ 源码获取成功！', 'success');
        } catch (err) {
            showStatus(`❌ 获取失败：${err.message}`, 'error');
        } finally {
            getBtn.disabled = false;
        }
    }

    // 复制功能
    async function copyCode() {
        try {
            await navigator.clipboard.writeText(sourceCode);
            showStatus('✅ 复制成功！', 'success');
        } catch {
            showStatus('❌ 复制失败，请手动复制', 'error');
        }
    }

    getBtn.addEventListener('click', getSourceCode);
    copyBtn.addEventListener('click', copyCode);
    urlInput.addEventListener('keypress', e => e.key === 'Enter' && getSourceCode());
</script>
</body>
</html>
