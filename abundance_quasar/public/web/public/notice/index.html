<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通知自己 - 本地推送工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            padding: 25px;
        }
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .tip {
            color: #3498db;
            font-size: 13px;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e1e5e9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #3498db;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
            min-width: 120px;
        }
        .btn:hover {
            background: #2980b9;
        }
        .btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #95a5a6;
        }
        .status {
            margin: 10px 0;
            font-size: 14px;
            padding: 10px;
            border-radius: 4px;
        }
        .loading { color: #3498db; background: #e8f4fd; }
        .error { color: #e74c3c; background: #fdecea; }
        .success { color: #2ecc71; background: #e8f8f0; }
        .history {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #eee;
        }
        .history h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #666;
        }
        .history-item {
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        @media (max-width: 768px) {
            .btn-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">🔔 通知自己 - 本地桌面推送</h1>
    <div class="tip">
        ✅ 支持电脑/手机弹窗通知<br>
        ✅ 首次使用需授权通知权限<br>
        ✅ 纯本地运行，无网络上传
    </div>

    <div class="form-group">
        <label>通知标题</label>
        <input type="text" id="title" placeholder="请输入通知标题（如：任务提醒）" value="本地通知">
    </div>

    <div class="form-group">
        <label>通知内容</label>
        <textarea id="content" placeholder="请输入通知内容（如：测试完成、任务提醒）">这是一条本地推送通知</textarea>
    </div>

    <div class="btn-group">
        <button class="btn" id="sendBtn">发送通知</button>
        <button class="btn reset-btn" id="resetBtn">清空内容</button>
    </div>

    <div id="status" class="status"></div>

    <!-- 通知历史记录 -->
    <div class="history" id="history" style="display: none;">
        <h3>📝 最近通知记录</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    const titleInput = document.getElementById('title');
    const contentInput = document.getElementById('content');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusBox = document.getElementById('status');
    const historyBox = document.getElementById('history');
    const historyList = document.getElementById('historyList');

    // 通知历史记录
    let notifyHistory = [];
    const MAX_HISTORY = 5;

    // 显示状态
    function showStatus(text, type) {
        statusBox.textContent = text;
        statusBox.className = `status ${type}`;
        // 3秒后自动清空状态
        setTimeout(() => {
            statusBox.textContent = '';
            statusBox.className = 'status';
        }, 3000);
    }

    // 申请通知权限
    async function requestPermission() {
        if (!('Notification' in window)) {
            showStatus('❌ 您的浏览器不支持桌面通知', 'error');
            return false;
        }
        const permission = await Notification.requestPermission();
        return permission === 'granted';
    }

    // 发送通知
    async function sendNotification() {
        const title = titleInput.value.trim();
        const content = contentInput.value.trim();

        if (!title) {
            showStatus('❌ 请输入通知标题', 'error');
            return;
        }
        if (!content) {
            showStatus('❌ 请输入通知内容', 'error');
            return;
        }

        // 申请权限
        const hasPermission = await requestPermission();
        if (!hasPermission) {
            showStatus('❌ 已拒绝通知权限，请在浏览器设置中开启', 'error');
            return;
        }

        try {
            // 发送桌面通知
            const notification = new Notification(title, {
                body: content,
                icon: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzM0OThkYiI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTAgMThjLTQuNDEgMC04LTMuNTktOC04czMuNTktOCA4LTggOCAzLjU5IDggOC0zLjU5IDgtOCA4em0tMS0xMmgydjZoLTJ6bTAgNGgydjJoLTJ6Ii8+PC9zdmc+',
                tag: 'local-notify'
            });

            // 点击通知回调
            notification.onclick = () => {
                window.focus();
                notification.close();
            };

            // 记录历史
            addHistory(title, content);
            showStatus('✅ 通知发送成功！', 'success');
        } catch (e) {
            showStatus('❌ 通知发送失败：' + e.message, 'error');
        }
    }

    // 添加历史记录
    function addHistory(title, content) {
        notifyHistory.unshift({
            title,
            content,
            time: new Date().toLocaleString()
        });
        // 限制最大记录数
        if (notifyHistory.length > MAX_HISTORY) {
            notifyHistory.pop();
        }
        renderHistory();
    }

    // 渲染历史记录
    function renderHistory() {
        historyBox.style.display = notifyHistory.length ? 'block' : 'none';
        historyList.innerHTML = notifyHistory.map(item => `
        <div class="history-item">
          <div><strong>${item.title}</strong></div>
          <div>${item.content}</div>
          <div style="color:#999;font-size:12px">${item.time}</div>
        </div>
      `).join('');
    }

    // 清空输入框
    function resetForm() {
        titleInput.value = '本地通知';
        contentInput.value = '';
        showStatus('✅ 已清空内容', 'success');
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendNotification);
    resetBtn.addEventListener('click', resetForm);

    // 回车快捷发送
    contentInput.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') {
            sendNotification();
        }
    });
</script>
</body>
</html>
